<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InterviewAI</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style media="print">
    body { background: #fff !important; color: #000 !important; }
    header .subtitle, #progress, .btn, .results-actions,
    .mode-toggle-row, .cv-row { display: none !important; }
    .app { max-width: 100%; padding: 20px; }
    header h1 { -webkit-text-fill-color: #000 !important; color: #000 !important; background: none !important; font-size: 1.6rem; }
    .card { border: none !important; background: #fff !important; padding: 0; }

    /* Mode badge — prominent at top of PDF */
    .done-mode-badge {
      display: block !important;
      background: #333 !important;
      color: #fff !important;
      font-size: 0.85rem !important;
      padding: 6px 16px !important;
      border-radius: 4px !important;
      margin-bottom: 10px;
      width: fit-content;
    }
    .done-mode-inline { color: #555 !important; }
    .done-avg { color: #000 !important; }
    .done-card h2 { color: #000 !important; }

    .summary-section { border: 1px solid #ccc !important; background: #fff !important; break-inside: avoid; margin-bottom: 20px; }
    .summary-q-num { background: #333 !important; }
    .summary-q-text, .summary-transcript p, .summary-feedback p { color: #000 !important; }
    .transcript-label { color: #555 !important; }
    .scores-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .score-card { border: 1px solid #ccc !important; background: #f9f9f9 !important; }
    .score-value { color: #000 !important; font-size: 1.2rem; }
    .score-label, .score-sub, .score-why { color: #555 !important; }
    .score-fill { background: #333 !important; }
    .score-bar { background: #ddd !important; }
    .summary-transcript, .summary-feedback { border: 1px solid #ccc !important; background: #f9f9f9 !important; }
    .formality-badge { border: 1px solid #999 !important; color: #000 !important; }
    .formality-notes { color: #555 !important; }
    .star-item { border: 1px solid #999 !important; color: #000 !important; background: #f0f0f0 !important; }
    .star-item.covered { background: #e0f5e9 !important; }
    .star-item.missing { background: #fde8e8 !important; }

    /* Holistic review print styles */
    .hire-badge { background: #f0f0f0 !important; color: #000 !important; border: 1px solid #999 !important; }
    .competency-item { border: 1px solid #ccc !important; background: #f9f9f9 !important; }
    .competency-name { color: #555 !important; }
    .evidence-badge { background: #f0f0f0 !important; color: #000 !important; }
    .sim-finding { border: 1px solid #ccc !important; background: #f9f9f9 !important; }
    .sim-finding-title { color: #000 !important; }
    .sim-finding-detail { color: #555 !important; }
    .sim-finding-refs { color: #333 !important; }
    .sim-answer-highlight { border: 1px solid #ccc !important; background: #f9f9f9 !important; }
    .coaching-box { border: 1px solid #ccc !important; background: #f9f9f9 !important; }
    .coaching-box h3 { color: #333 !important; }
    .coaching-box p { color: #000 !important; }
    .review-section-label { color: #555 !important; }
    .sim-framing { display: none !important; }
    .eye-btn-row { display: none !important; }
    .sim-interviewer-tag { color: #333 !important; }
    .hire-reasoning { color: #000 !important; }
    .done-avg { color: #000 !important; }
  </style>
</head>
<body>
  <button id="exit-btn" title="Exit app" onclick="actions.shutdown()">✕</button>
  <div class="app">
    <header>
      <h1>InterviewAI</h1>
      <p class="subtitle">Local interview coach — runs entirely on your machine</p>
    </header>
    <div id="progress" class="progress hidden"></div>
    <div id="card-container"></div>
  </div>
  <div id="build-tag">v7.5.0</div>
  <div id="dev-panel" class="dev-panel hidden">
    <div class="dev-panel-header">
      <span>Dev Log</span>
      <div class="dev-panel-controls">
        <button class="dev-btn dev-btn-copy" onclick="devCopy()">Copy</button>
        <button class="dev-btn" onclick="devClear()">Clear</button>
        <button class="dev-btn" onclick="toggleDevPanel()">✕</button>
      </div>
    </div>
    <div id="dev-log" class="dev-log"></div>
  </div>
  <button id="dev-toggle-btn" onclick="toggleDevPanel()" title="Toggle dev log">DEV</button>
  <script src="/static/app.js?v=7.5.0"></script>
</body>
</html>
